<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Hover cursor: wings lifted for a flutter animation cue -->
  <g fill="none" stroke="#141316" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-135 16 16)">
    <ellipse cx="14" cy="16" rx="10" ry="6.5" fill="#ffd24a"/>
    <rect x="8" y="10" width="3" height="12" fill="#141316"/>
    <rect x="12" y="10" width="3" height="12" fill="#ffd24a"/>
    <rect x="16" y="10" width="3" height="12" fill="#141316"/>
    <circle cx="8" cy="16" r="4" fill="#ffd24a"/>
    <circle cx="7" cy="15" r="1.2" fill="#141316" stroke="none"/>
    <!-- Wings lifted -->
    <ellipse cx="12" cy="7.5" rx="5.5" ry="3" fill="#e7f6ff" stroke="#5aa9e6" stroke-width="1.1" transform="rotate(-28 12 7.5)"/>
    <ellipse cx="16" cy="24.5" rx="5.5" ry="3" fill="#e7f6ff" stroke="#5aa9e6" stroke-width="1.1" transform="rotate(24 16 24.5)"/>
    <!-- Motion lines near wings to imply flutter -->
    <path d="M5 6.5c1.4 0.4 2.6 1 3.6 1.9" stroke="#5aa9e6" stroke-width="1" stroke-linecap="round"/>
    <path d="M23.5 26c1.2 0.6 2.3 1.3 3.1 2.3" stroke="#5aa9e6" stroke-width="1" stroke-linecap="round"/>
    <!-- Stinger -->
    <polygon points="24,16 30,16 24,13.5" fill="#141316" stroke="#141316"/>
  </g>
</svg>
